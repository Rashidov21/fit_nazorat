{% extends 'base.html' %}

{% block title %}Tizimga kirish - FitNazorat{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-slate-50 relative overflow-hidden">
    <!-- Abstract Shape BG -->
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-indigo-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 text-center">
        <h2 class="mt-6 text-3xl font-extrabold text-slate-900 drop-shadow-sm">
            Tizimga kirish
        </h2>
        <p class="mt-2 text-sm text-slate-600 font-medium">
            O'z sport zalingizni boshqarish paneli
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
        <div class="bg-white/70 backdrop-blur-xl py-10 px-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-3xl border border-white sm:px-10">
            <form class="space-y-6" action="{% url 'login' %}" method="POST">
                {% csrf_token %}

                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700">Pochta manzili</label>
                    <div class="mt-2 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input id="email" name="email" type="email" required class="appearance-none block w-full pl-10 px-3 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm bg-white/50 transition" placeholder="Sizning pochtangiz">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700">Parol</label>
                    <div class="mt-2 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input id="password" name="password" type="password" required class="appearance-none block w-full pl-10 px-3 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm bg-white/50 transition" placeholder="Parol">
                    </div>
                </div>

                <div class="flex items-center justify-between mt-4">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-700 cursor-pointer">
                            Eslab qolish
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="javascript:void(0)" class="font-medium text-blue-600 hover:text-blue-500 transition">
                            Parolni unutdingizmi?
                        </a>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition">
                        Tizimga kirish
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center text-sm font-medium text-slate-600">
                Akkountingiz yo'qmi? 
                <a href="{% url 'register_trial' %}" class="text-blue-600 hover:text-blue-800 font-bold ml-1 transition">Bepul sinab ko'ring</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
