<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangi Sport Zali - FitNazorat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6">
    <div class="bg-white border border-slate-200 rounded-3xl shadow-xl max-w-xl w-full p-10">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Yangi Sport Zali</h1>
        <p class="text-slate-500 mb-8 border-b pb-4 text-sm font-medium">Tizimga yangi sport klubini qo'shish va unga admin yaratish.</p>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Klub nomi</label>
                <input type="text" name="name" placeholder="Masalan: Gold's Gym Andijon" required class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">SaaS Tarif Rejasi</label>
                <select name="plan_id" required class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <option value="">Rejani tanlang</option>
                    {% for plan in plans %}
                    <option value="{{ plan.id }}">{{ plan.name }} (${{ plan.price }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Admin pochtasi (Login uchun)</label>
                <input type="email" name="owner_email" placeholder="admin@gym.uz" required class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                <p class="mt-2 text-xs text-blue-600 font-medium italic">* Parol avtomatik tarzda 'gym12345' qilib belgilanadi.</p>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Telefon raqam</label>
                <input type="text" name="phone" placeholder="+998 90 ..." required class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Manzil</label>
                <textarea name="address" rows="2" class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition"></textarea>
            </div>
            <div class="flex gap-4 pt-4">
                <a href="{% url 'superadmin_gyms' %}" class="flex-1 text-center py-4 text-slate-500 font-bold hover:text-slate-800 transition">Bekor qilish</a>
                <button type="submit" class="flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/30 transition">Qo'shish</button>
            </div>
        </form>
    </div>
</body>
</html>
