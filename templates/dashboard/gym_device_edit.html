<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qurilmani Tahrirlash - {{ gym.name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 flex h-screen overflow-hidden text-slate-800">

    <aside class="w-64 bg-white shadow-lg flex flex-col justify-between flex-shrink-0 border-r border-slate-200">
        <div>
            <div class="h-16 flex items-center px-6 border-b border-slate-100 mb-6 bg-blue-600 text-white">
                <span class="font-bold text-lg tracking-tight truncate w-full">{{ gym.name }}</span>
            </div>
            <nav class="px-4 space-y-2">
                <a href="{% url 'gym_dashboard' %}" class="flex items-center gap-3 text-slate-500 hover:bg-slate-50 hover:text-blue-600 px-4 py-3 rounded-xl font-medium transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Bosh sahifa
                </a>
                <a href="{% url 'gym_devices' %}" class="flex items-center gap-3 bg-blue-50 text-blue-700 px-4 py-3 rounded-xl font-medium transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                    Face ID Qurilmalar
                </a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-slate-50/50 relative">
        <header class="h-16 flex items-center justify-between px-8 z-10">
            <h1 class="text-2xl font-bold text-slate-800">Qurilmani tahrirlash</h1>
            <a href="{% url 'gym_devices' %}" class="text-slate-500 hover:text-slate-800 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Orqaga qaytish
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-8 pt-4 z-10">
            <div class="bg-white border border-slate-200 rounded-3xl shadow-sm max-w-xl mx-auto p-8">
                <form method="POST" class="space-y-6">
                    {% csrf_token %}
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Qurilma nomi</label>
                        <input type="text" name="name" value="{{ device.device_name }}" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Serial Number</label>
                        <input type="text" name="serial" value="{{ device.serial_number }}" required class="w-full px-4 py-3 border border-slate-200 rounded-xl font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Qurilma IP manzili</label>
                        <input type="text" name="ip" value="{{ device.ip_address|default:'' }}" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>

                    <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <input type="checkbox" name="is_active" id="is_active" {% if device.is_active %}checked{% endif %} class="w-5 h-5 text-blue-600 rounded">
                        <label for="is_active" class="text-sm font-bold text-slate-700">Qurilma faol (Xabarlarni qabul qiladi)</label>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/30 transition">
                            Saqlash
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
